<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 40" fill="none">
  <defs>
    <linearGradient id="gH" x1="20" y1="3" x2="20" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffd166"/>
      <stop offset="55%"  stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#c07800"/>
    </linearGradient>
    <filter id="hGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── ISOTIPO ── -->
  <rect x="2"  y="3" width="5" height="26" rx="2.5" fill="url(#gH)"/>
  <rect x="33" y="3" width="5" height="26" rx="2.5" fill="url(#gH)"/>
  <polygon points="8,3 13,3 20,31"  fill="url(#gH)"/>
  <polygon points="27,3 32,3 20,31" fill="url(#gH)"/>
  <circle cx="20" cy="31" r="4" fill="#f0a500" opacity="0.16" filter="url(#hGlow)"/>

  <!-- ── WORDMARK ── -->
  <!-- MOVANTIA in Space Grotesk 800, baseline y=28, size 20px -->
  <text
    x="50" y="27"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="21"
    font-weight="800"
    letter-spacing="-0.03em"
    fill="#ffffff"
  >MOVANTIA</text>

  <!-- Subtle tagline below -->
  <text
    x="51" y="37"
    font-family="'DM Sans', system-ui, sans-serif"
    font-size="8.5"
    font-weight="500"
    letter-spacing="0.06em"
    fill="#4e5a70"
  >CARGO MATCHING</text>
</svg>
