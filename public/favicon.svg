<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#07090F"/>

  <!-- Terminal ticks -->
  <line x1="2"  y1="7"  x2="6"  y2="7"  stroke="#D4A843" stroke-width="0.8" opacity="0.55"/>
  <line x1="26" y1="7"  x2="30" y2="7"  stroke="#D4A843" stroke-width="0.8" opacity="0.55"/>

  <!-- M shape -->
  <polyline points="7,27 7,7 16,16 25,7 25,27"
    stroke="#D4A843" stroke-width="1.8" stroke-linejoin="miter" filter="url(#g)"/>

  <!-- Top nodes -->
  <circle cx="7"  cy="7"  r="2.2" fill="#D4A843" filter="url(#g)"/>
  <circle cx="25" cy="7"  r="2.2" fill="#D4A843" filter="url(#g)"/>

  <!-- Center node -->
  <circle cx="16" cy="16" r="1.5" fill="#D4A843" opacity="0.7"/>

  <!-- Bottom hollow pins -->
  <circle cx="7"  cy="27" r="2" fill="#07090F" stroke="#D4A843" stroke-width="1.2"/>
  <circle cx="25" cy="27" r="2" fill="#07090F" stroke="#D4A843" stroke-width="1.2"/>
</svg>
