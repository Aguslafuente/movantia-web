<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="gF" x1="16" y1="2" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffd166"/>
      <stop offset="55%"  stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#c07800"/>
    </linearGradient>
    <filter id="fGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Rounded square clip for the background -->
    <clipPath id="bg">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#080d16"/>

  <!-- Left outer pillar -->
  <rect x="2" y="3" width="4" height="21" rx="2" fill="url(#gF)"/>
  <!-- Right outer pillar -->
  <rect x="26" y="3" width="4" height="21" rx="2" fill="url(#gF)"/>
  <!-- Left inner arrow -->
  <polygon points="7,3 11,3 16,25" fill="url(#gF)"/>
  <!-- Right inner arrow -->
  <polygon points="21,3 25,3 16,25" fill="url(#gF)"/>
  <!-- Match glow -->
  <circle cx="16" cy="25" r="3.5" fill="#f0a500" opacity="0.22" filter="url(#fGlow)"/>
</svg>
